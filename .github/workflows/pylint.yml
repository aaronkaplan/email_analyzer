name: Pylint

on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".pylintrc"
      - ".github/workflows/pylint.yml"
  push:
    branches:
      - main
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".pylintrc"
      - ".github/workflows/pylint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pylint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.13" ]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync project dependencies
        run: uv sync --group dev

      - name: Run Pylint
        run: uv run --with pylint pylint src/email_analyzer
