name: Ruff

on:
  pull_request:
    paths:
      - "app/*.py"
      - "Makefile"
      - ".github/workflows/ruff.yml"
  push:
    branches:
      - main
    paths:
      - "app/*.py"
      - "Makefile"
      - ".github/workflows/ruff.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.13" ]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run Ruff
        run: python -m ruff check . --exclude .venv .pytest_cache .github  benchmarks docs   