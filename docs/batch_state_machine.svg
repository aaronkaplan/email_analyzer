<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI Batch State Machine</title>
  <desc id="desc">State machine diagram for validating, in progress, finalizing, completed, failed, expired, cancelling, and cancelled batch states.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .active { fill: #dbeafe; stroke: #2563eb; }
      .terminal-success { fill: #dcfce7; stroke: #16a34a; }
      .terminal-error { fill: #fee2e2; stroke: #dc2626; }
      .terminal-neutral { fill: #fef3c7; stroke: #d97706; }
      .state {
        stroke-width: 2;
        rx: 16;
        ry: 16;
      }
      .label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 24px;
        font-weight: 600;
        fill: #0f172a;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .small {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 17px;
        fill: #334155;
        text-anchor: middle;
      }
      .edge {
        stroke: #475569;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }
      .edge-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        fill: #475569;
        text-anchor: middle;
      }
      .legend {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        fill: #334155;
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="520" />

  <text x="590" y="42" class="label" style="font-size: 30px;">OpenAI Batch State Machine</text>

  <rect class="state active" x="60" y="170" width="190" height="92" />
  <text x="155" y="208" class="label">validating</text>
  <text x="155" y="238" class="small">input file checks</text>

  <rect class="state active" x="320" y="170" width="190" height="92" />
  <text x="415" y="208" class="label">in_progress</text>
  <text x="415" y="238" class="small">requests executing</text>

  <rect class="state active" x="580" y="170" width="190" height="92" />
  <text x="675" y="208" class="label">finalizing</text>
  <text x="675" y="238" class="small">assembling result files</text>

  <rect class="state terminal-success" x="840" y="170" width="190" height="92" />
  <text x="935" y="208" class="label">completed</text>
  <text x="935" y="238" class="small">results ready</text>

  <rect class="state terminal-error" x="60" y="370" width="190" height="92" />
  <text x="155" y="408" class="label">failed</text>
  <text x="155" y="438" class="small">validation failure</text>

  <rect class="state terminal-neutral" x="320" y="370" width="190" height="92" />
  <text x="415" y="408" class="label">expired</text>
  <text x="415" y="438" class="small">partial output possible</text>

  <rect class="state active" x="580" y="370" width="190" height="92" />
  <text x="675" y="408" class="label">cancelling</text>
  <text x="675" y="438" class="small">shutdown in progress</text>

  <rect class="state terminal-neutral" x="840" y="370" width="190" height="92" />
  <text x="935" y="408" class="label">cancelled</text>
  <text x="935" y="438" class="small">partial output possible</text>

  <path class="edge" d="M 250 216 L 320 216" />
  <text x="285" y="200" class="edge-label">validation ok</text>

  <path class="edge" d="M 510 216 L 580 216" />
  <text x="545" y="200" class="edge-label">execution done</text>

  <path class="edge" d="M 770 216 L 840 216" />
  <text x="805" y="200" class="edge-label">files ready</text>

  <path class="edge" d="M 155 262 L 155 370" />
  <text x="104" y="322" class="edge-label">validation error</text>

  <path class="edge" d="M 415 262 L 415 370" />
  <text x="355" y="322" class="edge-label">24h window hit</text>

  <path class="edge" d="M 675 262 L 675 370" />
  <text x="622" y="322" class="edge-label">cancel requested</text>

  <path class="edge" d="M 770 416 L 840 416" />
  <text x="805" y="400" class="edge-label">shutdown finished</text>

  <rect x="1040" y="132" width="24" height="24" rx="6" class="active" />
  <text x="1076" y="149" class="legend">active / transitional</text>
  <rect x="1040" y="172" width="24" height="24" rx="6" class="terminal-success" />
  <text x="1076" y="189" class="legend">terminal success</text>
  <rect x="1040" y="212" width="24" height="24" rx="6" class="terminal-error" />
  <text x="1076" y="229" class="legend">terminal validation failure</text>
  <rect x="1040" y="252" width="24" height="24" rx="6" class="terminal-neutral" />
  <text x="1076" y="269" class="legend">terminal with possible partial output</text>
</svg>
